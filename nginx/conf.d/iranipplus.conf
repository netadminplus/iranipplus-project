# ─────────────────────────────────────────────────────────────────
# Iranipplus.com — Nginx Virtual Hosts
# Two vhosts: main site (Next.js) + admin panel (Payload CMS)
# HTTP → HTTPS redirect for both.
# ─────────────────────────────────────────────────────────────────

# ── Upstream definitions ──────────────────────────────────────────
upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

upstream cms_upstream {
    server cms:3001;
    keepalive 16;
}

# ── HTTP → HTTPS redirect (both domains) ─────────────────────────
server {
    listen 80;
    server_name iranipplus.com www.iranipplus.com admin.iranipplus.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── iranipplus.com — Next.js Frontend ───────────────────────────
server {
    listen 443 ssl http2;
    server_name iranipplus.com www.iranipplus.com;

    # SSL
    ssl_certificate     /etc/nginx/certs/iranipplus.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/iranipplus.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;

    # Logging
    access_log /var/log/nginx/iranipplus_access.log;
    error_log  /var/log/nginx/iranipplus_error.log warn;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js SSR
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ── admin.iranipplus.com — Payload CMS ──────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.iranipplus.com;

    ssl_certificate     /etc/nginx/certs/admin.iranipplus.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/admin.iranipplus.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:5m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Restrict to known IPs in production (uncomment & fill)
    # allow 1.2.3.4;
    # deny all;

    # Logging
    access_log /var/log/nginx/admin_access.log;
    error_log  /var/log/nginx/admin_error.log warn;

    client_max_body_size 50M;  # allow media uploads

    location / {
        proxy_pass http://cms_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
